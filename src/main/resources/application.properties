spring.application.name=onboarding3
server.port=${SERVER_PORT:8080}

# DB connection
spring.mongodb.uri=mongodb://localhost:27017/onboardingDB
#spring.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/onboarding3}
spring.data.mongodb.auto-index-creation=true

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
#spring.data.redis.host=${REDIS_HOST:localhost}
#spring.data.redis.port=${REDIS_PORT:6379}

# Kafka connection
spring.kafka.bootstrap-servers=localhost:9092
#spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost:9092}
# producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
# consumer
spring.kafka.consumer.group-id=country-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest

# deserialize into a specific object in case Kafka messages do not contain enough type metadata
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.onboarding3.domain.KafkaCountries

# use the configured type (above) instead of type headers inside Kafka messages
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# idempotence - exactly once in producer
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3
spring.kafka.producer.properties.max-in-flight-requests-per-connection=5

