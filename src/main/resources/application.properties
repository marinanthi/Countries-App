spring.application.name=onboarding3
server.port=8080

# DB connection
spring.mongodb.uri=mongodb://localhost:27017/onboardingDB
spring.data.mongodb.auto-index-creation=true

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Kafka connection
spring.kafka.bootstrap-servers=localhost:9092
# producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
# consumer
spring.kafka.consumer.group-id=country-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer

# package is safe to deserialize from JSON
#spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.onboarding3.domain

# deserialize into a specific object in case Kafka messages do not contain enough type metadata
spring.kafka.consumer.properties.spring.json.value.default.type=com.example.onboarding3.domain.KafkaCountries

# use the configured default type (above) instead of type headers inside Kafka messages
spring.kafka.consumer.properties.spring.json.use.type.headers=false

